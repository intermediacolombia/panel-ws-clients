name: panel_agentes
description: Panel de Agentes WhatsApp - App Móvil
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^18.0.0
  emoji_picker_flutter: ^4.4.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  permission_handler: ^11.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1
  change_app_package_name: ^1.4.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#128C7E"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
